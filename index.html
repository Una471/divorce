// ---- NO BUTTON LOGIC ----
let noClicks = 0;
let noScale = 1;
const noBtn = document.getElementById('noBtn');
const noMsg = document.getElementById('no-msg');

function positionNoBtn() {
  const yesBtn = document.querySelector('.btn-yes');
  const rect = yesBtn.getBoundingClientRect();
  noBtn.style.top = (rect.top + window.scrollY) + 'px';
  noBtn.style.left = (rect.right + 12) + 'px';
}
window.addEventListener('load', positionNoBtn);
window.addEventListener('resize', positionNoBtn);

noBtn.addEventListener('mouseenter', () => {
  noScale = Math.max(noScale - 0.12, 0.38);
  noBtn.style.transform = `scale(${noScale})`;
  runAway();
});

function runAway() {
  const margin = 20;
  const maxX = window.innerWidth - noBtn.offsetWidth - margin;
  const maxY = window.innerHeight - noBtn.offsetHeight - margin;
  const x = margin + Math.random() * maxX;
  const y = margin + Math.random() * maxY;
  noBtn.style.top = y + 'px';
  noBtn.style.left = x + 'px';
}

function clickNo() {
  noClicks++;
  runAway();
  spawnAngryEmojis();
  noMsg.style.display = 'block';
  if (noClicks >= 3) {
    noMsg.textContent = 'Okay, I see you\'re stubborn. But I\'m more stubborn. I\'ll wait. 😌';
  } else {
    noMsg.textContent = 'O bua lerago chomi😤 Try again and make the right decision.';

}

function spawnAngryEmojis() {
  const emojis = ['😤','🔥','💢','😡','🔥','😤','💥'];

      el.className = 'emoji-float';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = (10 + Math.random() * 80) + 'vw';
      el.style.top = (30 + Math.random() * 50) + 'vh';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2100);
    }, i * 120);
  }
}

function launchConfetti() {

      c.style.left = Math.random() * 100 + 'vw';
      c.style.top = '-20px';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.width = (6 + Math.random() * 10) + 'px';
      c.style.height = (6 + Math.random() * 10) + 'px';

      setTimeout(() => c.remove(), 5000);
    }, i * 25);
  }
}

// ---- PAGE NAV ----
function setPage(n) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const pageId = n === 35 ? 'page35' : 'page' + n;
  document.getElementById(pageId).classList.add('active');
  const suffixes = ['', 'b', 'c', 'e', 'd'];
  const pageNums = [1, 2, 3, 35, 4];
  suffixes.forEach((suffix, idx) => {
    pageNums.forEach(pn => {
      const dotId = 'd' + pn + suffix;
      const dot = document.getElementById(dotId);
      if (dot) dot.classList.toggle('active', pn === n);
    });
  });
  window.scrollTo(0, 0);
}

function goToPage2() {
  document.getElementById('celebration').classList.remove('show');
  setPage(2);
}
function goToPage3() { setPage(3); }
function goToPage35() { setPage(35); }
function goToPage4() { setPage(4); }

// ---- REMINDER LETTER ----
function showReminder() {
  document.getElementById('remindBtn').style.display = 'none';
  const content = document.getElementById('letterContent');
  content.style.display = 'block';
  const lines = content.querySelectorAll('.letter-line');
  lines.forEach((line, i) => {
    setTimeout(() => {
      line.classList.add('visible');
      if (i === lines.length - 1) {
        setTimeout(() => {
          document.getElementById('nextBtn2').style.display = 'block';
        }, 600);
      }
    }, i * 400 + 200);
  });
}
